[tool.poetry]
name = "flywheel-file-curator"
version = "0.1.0"
description = "Curate a given file, to be used as a gear rule\u001b"
authors = ["Flywheel <support@flywheel.io>"]
license = "MIT"

[tool.poetry.dependencies]
python = "^3.8"
lxml = "^4.6.2"
pandas = "^1.1.4"
nibabel = "^3.2.1"
Pillow = "^8.0.1"
piexif = "^1.1.3"
pydicom = "^2.1.1"
pypng = "^0.0.20"
flywheel-gear-toolkit = { git = "https://gitlab.com/flywheel-io/public/gear-toolkit.git", branch = "curator-update" }
flywheel-hierarchy-curator = { git = "https://gitlab.com/flywheel-io/flywheel-apps/hierarchy-curator.git", branch = "1.0.0-dev" }

[tool.poetry.dev-dependencies]
pytest = "^6.1.2"
pytest-cov = "^2.10.1"
pytest-mock = "^3.3.1"
coverage = {extras = ["toml"], version = "^5.3"}

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

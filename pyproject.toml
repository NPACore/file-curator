[tool.poetry]
name = "fw-gear-file-curator"
version = "0.2.0"
description = "Utility gear to curate input file based on curation script provided as input."
readme = "README.md"
authors = ["Flywheel <support@flywheel.io>"]
license = "MIT"

[tool.poetry.dependencies]
python = "^3.8"
lxml = "^4.6.2"
pandas = "^1.1.4"
nibabel = "^3.2.1"
Pillow = "^8.0.1"
piexif = "^1.1.3"
pydicom = "^2.1.1"
pypng = "^0.0.20"
flywheel-gear-toolkit = "^0.2"

[tool.poetry.dev-dependencies]
pytest = "^6.1.2"
pytest-cov = "^2.10.1"
pytest-mock = "^3.3.1"
coverage = {extras = ["toml"], version = "^5.3"}
black = "^20.8b1"
isort = "^5.6.4"

[build-system]
requires = ["poetry>=0.12"]
build-backend = "poetry.core.masonry.api"
